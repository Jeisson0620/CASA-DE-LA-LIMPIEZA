<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones del Mes</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        .container { width: 80%; margin: auto; overflow: hidden; padding: 2rem; }
        .promo-card { background: #fff; border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .price { color: #e8491d; font-weight: bold; font-size: 1.2rem; }
        footer { text-align: center; padding: 2rem; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>Nuestras Promociones</h1>
    </header>

    <div class="container">
        <div class="promo-card">
            <h2>Combo Teclado + Mouse Gamer</h2>
            <p>Aprovecha esta oferta por tiempo limitado. Ideal para oficina o juegos.</p>
            <p class="price">Precio: $25.00</p>
        </div>

        <div class="promo-card">
            <h2>Mantenimiento de UPS</h2>
            <p>¿Tu equipo se apaga al irse la luz? Nosotros te ayudamos con el cambio de batería.</p>
            <p class="price">Desde: $15.00</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 - Sitio Informativo de Soporte</p>
    </footer>
</body>
</html>
